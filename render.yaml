services:
  - type: web
    name: nifty-dashboard-backend
    env: node
    region: singapore  # Closest to India for low latency
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20            # Pin to Node 20 LTS — better-sqlite3 has prebuilt binaries for 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000         # Render routes external traffic → 10000 by default
      - key: FRONTEND_URL
        sync: false          # Set this in Render dashboard after Vercel URL is known
      - key: DB_PATH
        value: ./data/nifty.db
    healthCheckPath: /health
    autoDeploy: true
